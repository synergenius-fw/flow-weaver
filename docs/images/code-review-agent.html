<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>codeReviewAgent — Flow Weaver</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw; height: 100vh; overflow: hidden;
  font-family: Montserrat, 'Segoe UI', Roboto, sans-serif;
  color: #e8e8ee;
}

#canvas {
  display: block; width: 100%; height: 100%;
  cursor: grab;
  touch-action: none; user-select: none;
}
#canvas.dragging { cursor: grabbing; }

/* Port labels: hidden by default, shown on node hover */
.nodes > g .port-label,
.nodes > g .port-type-label,
.labels g[data-port-label] {
  opacity: 0; pointer-events: none;
  transition: opacity 0.15s ease-in-out;
}

/* Connection hover & dimming (attribute selector covers both main and scope connections) */
path[data-source] { transition: opacity 0.2s ease, stroke-width 0.15s ease; }
path[data-source]:hover { stroke-width: 4; cursor: pointer; }
body.node-active path[data-source].dimmed,
body.port-active path[data-source].dimmed { opacity: 0.1; }
body.port-hovered path[data-source].dimmed { opacity: 0.25; }

/* Port circles are interactive */
circle[data-port-id] { cursor: pointer; }
circle[data-port-id]:hover { stroke-width: 3; filter: brightness(1.3); }

/* Port-click highlighting */
path[data-source].highlighted { opacity: 1; }
circle[data-port-id].port-selected { filter: drop-shadow(0 0 6px currentColor); stroke-width: 4; }

/* Node selection glow */
@keyframes select-pop {
  0% { opacity: 0; stroke-width: 0; }
  50% { opacity: 0.6; stroke-width: 12; }
  100% { opacity: 0.35; stroke-width: 8; }
}
.node-glow { fill: none; pointer-events: none; animation: select-pop 0.3s ease-out forwards; }

/* Port hover path highlight */
path[data-source].port-hover { opacity: 1; }

/* Node hover glow + draggable cursor */
.nodes g[data-node-id] { cursor: grab; }
.nodes g[data-node-id]:active { cursor: grabbing; }
.nodes g[data-node-id]:hover > rect:first-of-type { filter: brightness(1.08); }

/* Zoom controls */
#controls {
  position: fixed; bottom: 16px; right: 16px;
  display: flex; align-items: center; gap: 2px;
  background: #1a1a2e; border: 1px solid #313143;
  border-radius: 8px; padding: 4px; z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.ctrl-btn {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border: none; border-radius: 6px;
  background: transparent; color: #babac0;
  font-size: 16px; font-weight: 600; cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.ctrl-btn:hover { background: #313143; color: #e8e8ee; }
#zoom-label {
  font-size: 11px; font-family: 'SF Mono', 'Fira Code', monospace;
  color: #767682; min-width: 36px; text-align: center;
}

/* Info panel */
#info-panel {
  position: fixed; bottom: 52px; left: 16px;
  max-width: 480px; min-width: 260px;
  background: #1a1a2e; border: 1px solid #313143;
  border-radius: 8px; padding: 12px 16px;
  font-size: 13px; line-height: 1.5;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  z-index: 10; display: none;
  max-height: calc(100vh - 120px); overflow-y: auto;
}
#info-panel.visible { display: block; }
#info-panel h3 {
  font-size: 14px; font-weight: 700; margin: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#info-panel .node-desc { color: #babac0; font-size: 12px; margin-bottom: 8px; font-style: italic; }
#info-panel .info-section { margin-bottom: 6px; }
#info-panel .info-label { font-size: 11px; font-weight: 600; color: #767682; text-transform: uppercase; letter-spacing: 0.5px; }
#info-panel .info-value { color: #babac0; }
#info-panel .port-list { list-style: none; padding: 0; }
#info-panel .port-list li { padding: 1px 0; }
#info-panel .port-list li::before { content: '\2022'; margin-right: 6px; color: #767682; }
#info-panel .port-type { color: #767682; font-size: 11px; margin-left: 4px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }
#info-panel pre {
  background: #161625; border: 1px solid #313143;
  border-radius: 6px; padding: 10px; overflow-x: auto;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 12px; line-height: 1.6; white-space: pre;
  max-height: 300px; overflow-y: auto; margin: 6px 0 0;
  color: #e6edf3;
}

/* Custom scrollbars */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(142,158,255,0.25); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(142,158,255,0.45); }
::-webkit-scrollbar-corner { background: transparent; }
* { scrollbar-width: thin; scrollbar-color: rgba(142,158,255,0.25) transparent; }

/* Info panel header */
#info-header {
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
}
#info-header h3 { flex: 1; margin-bottom: 0; }
.panel-btn {
  display: flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border: none; border-radius: 4px;
  background: transparent; color: #767682;
  cursor: pointer; transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.panel-btn:hover { background: #313143; color: #e8e8ee; }

/* Info panel transitions */
#info-panel {
  transition: left 0.3s cubic-bezier(0.4,0,0.2,1), bottom 0.3s cubic-bezier(0.4,0,0.2,1),
              width 0.3s cubic-bezier(0.4,0,0.2,1), height 0.3s cubic-bezier(0.4,0,0.2,1),
              max-width 0.3s cubic-bezier(0.4,0,0.2,1), max-height 0.3s cubic-bezier(0.4,0,0.2,1),
              min-width 0.3s cubic-bezier(0.4,0,0.2,1), border-radius 0.3s cubic-bezier(0.4,0,0.2,1),
              opacity 0.2s ease, transform 0.3s cubic-bezier(0.4,0,0.2,1);
  transform: translateY(8px); opacity: 0;
}
#info-panel.visible { transform: translateY(0); opacity: 1; }
#info-panel.fullscreen {
  left: 16px; bottom: 16px; top: 16px; right: 16px;
  max-width: none; min-width: 0; width: auto; max-height: none;
  border-radius: 12px;
}
#info-panel.fullscreen pre { max-height: none; }
.hl-kw { color: #8e9eff; }
.hl-str { color: #ff7b72; }
.hl-num { color: #f0a050; }
.hl-cm { color: #6a737d; font-style: italic; }
.hl-fn { color: #d2a8ff; }
.hl-ty { color: #d2a8ff; }
.hl-pn { color: #b8bdd0; }
.hl-ann { color: #8e9eff; font-weight: 600; font-style: normal; }
.hl-arr { color: #79c0ff; font-weight: 600; font-style: normal; }
.hl-id { color: #e6edf3; font-style: normal; }
.hl-sc { color: #d2a8ff; font-style: italic; }

/* Branding badge */
#branding {
  position: fixed; bottom: 16px; left: 16px;
  display: flex; align-items: center; gap: 6px;
  background: #1a1a2e; border: 1px solid #313143;
  border-radius: 8px; padding: 6px 12px;
  font-size: 12px; font-weight: 600; color: #babac0;
  text-decoration: none; z-index: 9;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  transition: color 0.15s, border-color 0.15s;
}
#branding:hover { color: #e8e8ee; border-color: #767682; }

/* Scroll hint */
#scroll-hint {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75); color: #fff;
  padding: 6px 14px; border-radius: 8px;
  font-size: 13px; pointer-events: none;
  z-index: 20; opacity: 0; transition: opacity 0.3s;
}
#scroll-hint.visible { opacity: 1; }
#scroll-hint kbd {
  display: inline-block; padding: 1px 5px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 3px; font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px; background: rgba(255,255,255,0.1);
}

/* Studio nudge toast */
#studio-hint {
  position: fixed; bottom: 60px; left: 50%;
  transform: translateX(-50%);
  background: #1a1a2e; border: 1px solid #313143;
  padding: 8px 16px; border-radius: 8px;
  font-size: 13px; color: #babac0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  z-index: 20; opacity: 0; transition: opacity 0.4s;
  pointer-events: none;
}
#studio-hint.visible { opacity: 1; pointer-events: auto; }
#studio-hint a { color: #8e9eff; text-decoration: none; font-weight: 600; }
#studio-hint a:hover { text-decoration: underline; }
</style>
</head>

<script>var nodeSources = {"analyze":{"source":"/**\n * @flowWeaver nodeType\n * @expression\n * @async\n * @label Analyze Diff\n * @input diff - The pull request diff content\n * @input title - PR title\n * @input author - PR author\n * @input number - PR number\n * @input repo - Repository (owner/name)\n * @output context - Review context with AI-identified findings\n */\nasync function analyzeDiff(\n  diff: string,\n  title: string,\n  author: string,\n  number: number,\n  repo: string,\n): Promise<{ context: ReviewFindings }> {\n  const response = await llm.chat([\n    {\n      role: 'system',\n      content: 'You are a code review assistant. Analyze the diff for:\\n1. Security vulnerabilities (injection, secrets, OWASP)\\n2. Code quality issues (complexity, duplication)\\n3. Style violations (naming, formatting)\\n\\nReturn a JSON array of { file, line, category, description } objects.',\n    },\n    {\n      role: 'user',\n      content: `PR: ${repo}#${number} — ${title} by ${author}\\n\\nDiff:\\n${diff}`,\n    },\n  ], { temperature: 0.2 });\n\n  let findings: ReviewFindings['findings'];\n  try {\n    const cleaned = response.replace(/^```(?:json)?\\n?/m, '').replace(/\\n?```$/m, '').trim();\n    findings = JSON.parse(cleaned);\n  } catch {\n    findings = [];\n  }\n\n  return {\n    context: {\n      diff,\n      metadata: { title, author, number, repo },\n      findings,\n      classified: { critical: [], warnings: [], suggestions: [] },\n    },\n  };\n}","ports":{"diff":{"type":"STRING","tsType":"string"},"title":{"type":"STRING","tsType":"string"},"author":{"type":"STRING","tsType":"string"},"number":{"type":"NUMBER","tsType":"number"},"repo":{"type":"STRING","tsType":"string"},"execute":{"type":"STEP"},"context":{"type":"ANY"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"classify":{"source":"/**\n * @flowWeaver nodeType\n * @expression\n * @label Classify Severity\n * @input context - Review context with raw findings\n * @output context - Review context with findings grouped by severity\n */\nfunction classifySeverity(context: ReviewFindings): { context: ReviewFindings } {\n  const critical = context.findings.filter(f => f.category === 'security');\n  const warnings = context.findings.filter(f => f.category === 'quality');\n  const suggestions = context.findings.filter(f => f.category === 'style');\n\n  return {\n    context: { ...context, classified: { critical, warnings, suggestions } },\n  };\n}","ports":{"context":{"type":"OBJECT","tsType":"ReviewFindings"},"execute":{"type":"STEP"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"route":{"source":"/**\n * @flowWeaver nodeType\n * @label Route Review\n * @input context - Review context with classified findings\n * @output context - Pass-through context\n */\nfunction routeReview(\n  execute: boolean,\n  context: ReviewFindings,\n): { onSuccess: boolean; onFailure: boolean; context: ReviewFindings } {\n  if (!execute) return { onSuccess: false, onFailure: false, context };\n  const hasCritical = context.classified.critical.length > 0;\n  return { onSuccess: !hasCritical, onFailure: hasCritical, context };\n}","ports":{"context":{"type":"OBJECT","tsType":"ReviewFindings"},"execute":{"type":"STEP"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"approve":{"source":"/**\n * @flowWeaver nodeType\n * @expression\n * @label Approve Clean\n * @input context - Review context (no critical issues)\n * @output reviewComment - Approval comment\n * @output action - Review action\n */\nfunction approveClean(context: ReviewFindings): { reviewComment: string; action: string } {\n  const lines: string[] = [\n    `## ✅ PR Review — ${context.metadata.repo}#${context.metadata.number}`,\n    '',\n    `**Author:** ${context.metadata.author}`,\n    `**Title:** ${context.metadata.title}`,\n    '',\n  ];\n\n  if (context.classified.warnings.length > 0 || context.classified.suggestions.length > 0) {\n    lines.push('Approved with comments:');\n    lines.push('');\n    for (const w of context.classified.warnings) {\n      lines.push(`- ⚠️ **${w.file}:${w.line}** — ${w.description}`);\n    }\n    for (const s of context.classified.suggestions) {\n      lines.push(`- 💡 **${s.file}:${s.line}** — ${s.description}`);\n    }\n  } else {\n    lines.push('No issues found. Looks good to merge!');\n  }\n\n  return { reviewComment: lines.join('\\n'), action: 'approve' };\n}","ports":{"context":{"type":"OBJECT","tsType":"ReviewFindings"},"execute":{"type":"STEP"},"reviewComment":{"type":"STRING","tsType":"string"},"action":{"type":"STRING","tsType":"string"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"request":{"source":"/**\n * @flowWeaver nodeType\n * @expression\n * @label Request Changes\n * @input context - Review context (has critical issues)\n * @output reviewComment - Changes requested comment\n * @output action - Review action\n */\nfunction requestChanges(context: ReviewFindings): { reviewComment: string; action: string } {\n  const lines: string[] = [\n    `## 🚨 PR Review — ${context.metadata.repo}#${context.metadata.number}`,\n    '',\n    `**Author:** ${context.metadata.author}`,\n    `**Title:** ${context.metadata.title}`,\n    '',\n    `Found **${context.classified.critical.length}** critical issue${context.classified.critical.length === 1 ? '' : 's'} that must be fixed before merge:`,\n    '',\n  ];\n\n  for (const c of context.classified.critical) {\n    lines.push(`- 🚨 **${c.file}:${c.line}** — ${c.description}`);\n  }\n\n  if (context.classified.warnings.length > 0) {\n    lines.push('', 'Also consider:');\n    for (const w of context.classified.warnings) {\n      lines.push(`- ⚠️ **${w.file}:${w.line}** — ${w.description}`);\n    }\n  }\n\n  return { reviewComment: lines.join('\\n'), action: 'request_changes' };\n}","ports":{"context":{"type":"OBJECT","tsType":"ReviewFindings"},"execute":{"type":"STEP"},"reviewComment":{"type":"STRING","tsType":"string"},"action":{"type":"STRING","tsType":"string"},"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"}}},"Start":{"ports":{"execute":{"type":"STEP","tsType":"boolean"},"diff":{"type":"STRING","tsType":"string"},"title":{"type":"STRING","tsType":"string"},"author":{"type":"STRING","tsType":"string"},"number":{"type":"NUMBER","tsType":"number"},"repo":{"type":"STRING","tsType":"string"}}},"Exit":{"ports":{"onSuccess":{"type":"STEP"},"onFailure":{"type":"STEP"},"reviewComment":{"type":"STRING"},"action":{"type":"STRING"}}}};</script>

  // ---- Connection path computation (from geometry.ts) ----
  function quadCurveControl(ax, ay, bx, by, ux, uy) {

  }

  function computeConnectionPath(sx, sy, tx, ty) {
    var e = 0.0001;
    var ax = sx + e, ay = sy + e, hx = tx - e, hy = ty - e;
    var ramp = Math.min(20, (hx - ax) / 10);
    var bx = ax + ramp, by = ay + e, gx = hx - ramp, gy = hy - e;
    var curveSizeX = Math.min(60, Math.abs(ax - hx) / 4);
    var curveSizeY = Math.min(60, Math.abs(ay - hy) / 4);
    var curveMag = Math.sqrt(curveSizeX * curveSizeX + curveSizeY * curveSizeY);
    var bgX = gx - bx, bgY = gy - by;
    var bgLen = Math.sqrt(bgX * bgX + bgY * bgY);
    var bgUx = bgX / bgLen, bgUy = bgY / bgLen;
    var dx = bx + bgUx * curveMag, dy = by + (bgUy * curveMag) / 2;
    var ex = gx - bgUx * curveMag, ey = gy - (bgUy * curveMag) / 2;
    var deX = ex - dx, deY = ey - dy;
    var deLen = Math.sqrt(deX * deX + deY * deY);
    var deUx = deX / deLen, deUy = deY / deLen;

      ' L ' + bx + ',' + by + ' Q ' + c[0] + ',' + c[1] + ' ' + dx + ',' + dy +
      ' L ' + ex + ',' + ey + ' Q ' + f[0] + ',' + f[1] + ' ' + gx + ',' + gy +

          if (c.srcNode === childId || c.tgtNode === childId) {

    }
    if (inputs.length) {
      html += '<div class="info-section"><div class="info-label">Inputs</div><ul class="port-list">';
      inputs.forEach(function(n) { html += '<li>' + portLabel(n) + '</li>'; });
      html += '</ul></div>';
    }
    if (outputs.length) {
      html += '<div class="info-section"><div class="info-label">Outputs</div><ul class="port-list">';
      outputs.forEach(function(n) { html += '<li>' + portLabel(n) + '</li>'; });
      html += '</ul></div>';
    }
    if (connectedNodes.size) {
      html += '<div class="info-section"><div class="info-label">Connected to</div><div class="info-value">';
      html += Array.from(connectedNodes).map(escapeH).join(', ');
      html += '</div></div>';
    }
    if (src && src.source) {
      html += '<div class="info-section"><div class="info-label">Source</div>';
      html += '<pre><code>' + highlightTS(src.source) + '</code></pre></div>';
    }
    infoBody.innerHTML = html;
    infoPanel.classList.add('visible');
  }

  function escapeH(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  var fwAnnotations = 'flowWeaver,input,output,step,node,connect,param,returns,fwImport,label,scope,position,color,icon,tag,map,path,name,description,expression,executeWhen,pullExecution,strictTypes,autoConnect,port,trigger,cancelOn,retries,timeout,throttle';

  function highlightJSDoc(block) {
    var annSet = fwAnnotations.split(',');
    var out = '';
    var re = /(@[a-zA-Z]+)|(-&gt;)|(\.[a-zA-Z_][a-zA-Z0-9_]*)|("[^"]*")|('\''[^'\'']*'\'')|(-?[0-9]+(?:\.[0-9]+)?)|([a-zA-Z_][a-zA-Z0-9_]*)|([^@a-zA-Z0-9"'\-.]+)/g;
    var m;
    while ((m = re.exec(block)) !== null) {
      if (m[1]) {
        var tag = m[1].slice(1);
        if (annSet.indexOf(tag) >= 0) {
          out += '<span class="hl-ann">' + m[0] + '</span>';
        } else {
          out += '<span class="hl-ann">' + m[0] + '</span>';
        }
      } else if (m[2]) {
        out += '<span class="hl-arr">' + m[2] + '</span>';
      } else if (m[3]) {
        // .portName scope reference
        out += '<span class="hl-sc">' + m[3] + '</span>';
      } else if (m[4] || m[5]) {
        out += '<span class="hl-str">' + (m[4] || m[5]) + '</span>';
      } else if (m[6]) {
        out += '<span class="hl-num">' + m[6] + '</span>';
      } else if (m[7]) {
        var tys = 'string,number,boolean,any,void,never,unknown,STEP,STRING,NUMBER,BOOLEAN,ARRAY,OBJECT,FUNCTION,ANY';
        if (tys.split(',').indexOf(m[7]) >= 0) {
          out += '<span class="hl-ty">' + m[7] + '</span>';
        } else {
          out += '<span class="hl-id">' + m[7] + '</span>';
        }
      } else {
        out += m[0];
      }
    }
    return out;
  }

  function highlightTS(code) {
    var tokens = [];
    var i = 0;
    while (i < code.length) {
      // Line comments
      if (code[i] === '/' && code[i+1] === '/') {
        var end = code.indexOf('\n', i);
        if (end === -1) end = code.length;
        tokens.push({ t: 'cm', v: code.slice(i, end) });
        i = end;
        continue;
      }
      // Block comments (detect JSDoc for annotation highlighting)
      if (code[i] === '/' && code[i+1] === '*') {
        var end = code.indexOf('*/', i + 2);
        if (end === -1) end = code.length; else end += 2;
        var block = code.slice(i, end);
        var hasFW = /@(flowWeaver|input|output|step|node|connect|param|returns)/.test(block);
        if (hasFW) {
          tokens.push({ t: 'jsdoc', v: block });
        } else {
          tokens.push({ t: 'cm', v: block });
        }
        i = end;
        continue;
      }
      // Strings
      if (code[i] === "'" || code[i] === '"' || code[i] === '`') {
        var q = code[i], j = i + 1;
        while (j < code.length && code[j] !== q) { if (code[j] === '\\') j++; j++; }
        tokens.push({ t: 'str', v: code.slice(i, j + 1) });
        i = j + 1;
        continue;
      }
      // Numbers
      if (/[0-9]/.test(code[i]) && (i === 0 || /[^a-zA-Z_$]/.test(code[i-1]))) {
        var j = i;
        while (j < code.length && /[0-9a-fA-FxX._]/.test(code[j])) j++;
        tokens.push({ t: 'num', v: code.slice(i, j) });
        i = j;
        continue;
      }
      // Words
      if (/[a-zA-Z_$]/.test(code[i])) {
        var j = i;
        while (j < code.length && /[a-zA-Z0-9_$]/.test(code[j])) j++;
        var w = code.slice(i, j);
        var kws = 'async,await,break,case,catch,class,const,continue,default,delete,do,else,export,extends,finally,for,from,function,if,import,in,instanceof,let,new,of,return,switch,throw,try,typeof,var,void,while,yield';
        var tys = 'string,number,boolean,any,void,never,unknown,null,undefined,true,false,Promise,Record,Map,Set,Array,Partial,Required,Omit,Pick';
        if (kws.split(',').indexOf(w) >= 0) {
          tokens.push({ t: 'kw', v: w });
        } else if (tys.split(',').indexOf(w) >= 0) {
          tokens.push({ t: 'ty', v: w });
        } else if (j < code.length && code[j] === '(') {
          tokens.push({ t: 'fn', v: w });
        } else {
          tokens.push({ t: '', v: w });
        }
        i = j;
        continue;
      }
      // Punctuation
      if (/[{}()\[\];:.,<>=!&|?+\-*/%^~@]/.test(code[i])) {
        tokens.push({ t: 'pn', v: code[i] });
        i++;
        continue;
      }
      // Whitespace and other
      tokens.push({ t: '', v: code[i] });
      i++;
    }
    return tokens.map(function(tk) {
      if (tk.t === 'jsdoc') {
        return '<span class="hl-cm">' + highlightJSDoc(escapeH(tk.v)) + '</span>';
      }
      var v = escapeH(tk.v);
      return tk.t ? '<span class="hl-' + tk.t + '">' + v + '</span>' : v;
    }).join('');
  }

  // Delegate click: port click > node click > background
  // Use clickTarget (stashed from pointerdown) because setPointerCapture redirects click to canvas
  canvas.addEventListener('click', function(e) {
    if (didDrag || didDragNode) { didDragNode = false; return; }
    var target = clickTarget || e.target;
    clickTarget = null;
    while (target && target !== canvas) {
      if (target.hasAttribute && target.hasAttribute('data-port-id')) {
        e.stopPropagation();
        selectPort(target.getAttribute('data-port-id'));
        return;
      }
      if (target.hasAttribute && target.hasAttribute('data-node-id')) {
        e.stopPropagation();
        deselectPort();
        selectNode(target.getAttribute('data-node-id'));
        return;
      }
      target = target.parentElement;
    }
    deselectPort();
    deselectNode();
  });

  // ---- Panel expand/collapse ----
  btnExpand.addEventListener('click', function(e) {
    e.stopPropagation();
    infoPanel.classList.toggle('fullscreen');
    btnExpand.innerHTML = infoPanel.classList.contains('fullscreen') ? collapseIcon : expandIcon;
    btnExpand.title = infoPanel.classList.contains('fullscreen') ? 'Collapse panel' : 'Expand panel';
  });
  btnClosePanel.addEventListener('click', function(e) {
    e.stopPropagation();
    deselectPort();
    deselectNode();
    infoPanel.classList.remove('fullscreen');
    btnExpand.innerHTML = expandIcon;
  });

  // ---- Init ----
  requestAnimationFrame(fitToView);
  window.addEventListener('resize', fitToView);
})();
</script>
</body>
</html>
